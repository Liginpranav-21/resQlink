const timeAgo = (ts) => {
  const diff = Date.now() - ts, m = Math.floor(diff/60000);
  if(m<1) return 'Just now'; if(m<60) return m+'m ago';
  const h = Math.floor(m/60); if(h<24) return h+'h ago';
  return Math.floor(h/24)+'d ago';
};

// ─── Toast ────────────────────────────────────────────────────────────────────
function useToast() {
  const [toasts,setToasts] = useState([]);
  const show = useCallback((msg,type='info') => {
    const id = Date.now();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3000);
  },[]);
  return {toasts,show};
}
function Toasts({toasts}) {
  const colors = {success:'#10b981',error:'#ef4444',info:'#3b82f6',warning:'#f59e0b'};
  return <div style={{position:'fixed',top:20,right:20,zIndex:9999,display:'flex',flexDirection:'column',gap:8}}>
    {toasts.map(t=>(
      <div key={t.id} className="fade-in" style={{background:'#1e293b',border:`1px solid ${colors[t.type]}40`,borderLeft:`3px solid ${colors[t.type]}`,borderRadius:8,padding:'10px 16px',fontSize:13,color:'#e2e8f0',boxShadow:'0 4px 20px #00000060',minWidth:240,maxWidth:340}}>
        {t.msg}
      </div>
    ))}
  </div>;
}

// ─── Login Page ───────────────────────────────────────────────────────────────
function LoginPage({onLogin}) {
  const [mode,setMode] = useState('login');
  const [email,setEmail] = useState('');
  const [password,setPassword] = useState('');
  const [name,setName] = useState('');
  const [loading,setLoading] = useState(false);
  const [error,setError] = useState('');
  const [success,setSuccess] = useState('');

  const handleSubmit = async (e) => {
    e.preventDefault(); setError(''); setSuccess(''); setLoading(true);
    try {
      if (DEMO_MODE) {
        // Demo login — accept any email/password
        await new Promise(r=>setTimeout(r,800));
        onLogin({ uid:'demo-admin', email:email||'admin@resqlink.com', displayName:name||'Demo Admin', role:'admin' });
        return;
      }
      if (mode==='login') {
        const cred = await auth.signInWithEmailAndPassword(email,password);
        const snap = await db.collection('users').doc(cred.user.uid).get();
        if(!snap.exists||snap.data().role!=='admin') throw new Error('Access denied. Admin account required.');
        const d = snap.data();
        onLogin({uid:cred.user.uid,email:cred.user.email,displayName:d.displayName||'Admin',role:'admin'});
      } else if (mode==='register') {
        const cred = await auth.createUserWithEmailAndPassword(email,password);
        await db.collection('users').doc(cred.user.uid).set({uid:cred.user.uid,email,displayName:name,role:'admin',createdAt:firebase.firestore.FieldValue.serverTimestamp()});
        onLogin({uid:cred.user.uid,email,displayName:name,role:'admin'});
      } else {
        await auth.sendPasswordResetEmail(email);
        setSuccess('Password reset email sent. Check your inbox.');
      }
    } catch(err) {
      setError(err.message?.replace('Firebase: ','')?.replace(/\(auth[^)]+\)/,'').trim()||'Something went wrong');
    } finally { setLoading(false); }
  };

  const btn = {width:'100%',background:'#ef4444',border:'none',borderRadius:8,padding:'11px',color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',transition:'background .15s',opacity:loading?.5:1};

  return (
    <div style={{minHeight:'100vh',background:'#020617',display:'flex'}}>
      {/* Left Panel */}
      <div style={{width:'50%',background:'linear-gradient(135deg,#0f172a,#1a0a0a,#0f172a)',display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',padding:48,borderRight:'1px solid #1e293b'}}>
        <div style={{maxWidth:360,textAlign:'center'}}>
          <div style={{width:80,height:80,borderRadius:20,background:'#ef4444',display:'flex',alignItems:'center',justifyContent:'center',fontSize:36,fontWeight:700,color:'#fff',margin:'0 auto 24px'}}>R</div>
          <h1 style={{fontSize:40,fontWeight:700,color:'#f1f5f9',marginBottom:8}}>ResQLink</h1>
          <p style={{color:'#f87171',fontSize:16,fontWeight:500,marginBottom:24}}>"Connecting Help When Networks Fail"</p>
          <p style={{color:'#64748b',fontSize:13,lineHeight:1.7,marginBottom:32}}>AI-powered emergency rescue ecosystem. Monitor live incidents, dispatch rescue teams, control drones, and coordinate hospitals.</p>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,textAlign:'left'}}>
            {[['🚨','Live Emergency Feed'],['🚁','Drone Fleet Control'],['🦺','Rescue Team Dispatch'],['📊','Real-time Analytics']].map(([ic,lb])=>(
              <div key={lb} style={{display:'flex',alignItems:'center',gap:8,color:'#64748b',fontSize:12}}>
                <span style={{fontSize:16}}>{ic}</span><span>{lb}</span>
              </div>
            ))}
          </div>
          {DEMO_MODE && (
            <div style={{marginTop:24,padding:'10px 16px',background:'#f59e0b20',border:'1px solid #f59e0b40',borderRadius:8,fontSize:12,color:'#fbbf24',textAlign:'left'}}>
              ⚡ <strong>Demo Mode</strong> — Enter any email/password to explore the dashboard. Add your Firebase config to connect live data.
            </div>
          )}
        </div>
      </div>

      {/* Right Panel */}
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:32}}>
        <div style={{width:'100%',maxWidth:400}}>
          <div style={{background:'#0f172a',borderRadius:16,border:'1px solid #1e293b',padding:32}}>
            <h2 style={{color:'#f1f5f9',fontSize:20,fontWeight:600,marginBottom:4}}>
              {mode==='login'?'Sign in':mode==='register'?'Create account':'Reset password'}
            </h2>
            <p style={{color:'#64748b',fontSize:13,marginBottom:24}}>
              {mode==='login'?'Access the emergency command center':mode==='register'?'Register a new admin account':'Enter your email to reset password'}
            </p>

            {error && <div style={{marginBottom:16,padding:'10px 14px',background:'#ef444420',border:'1px solid #ef444440',borderRadius:8,color:'#f87171',fontSize:13}}>⚠️ {error}</div>}
            {success && <div style={{marginBottom:16,padding:'10px 14px',background:'#10b98120',border:'1px solid #10b98140',borderRadius:8,color:'#34d399',fontSize:13}}>✓ {success}</div>}

            <form onSubmit={handleSubmit} style={{display:'flex',flexDirection:'column',gap:14}}>
              {mode==='register' && (
                <div>
                  <label style={{color:'#64748b',fontSize:11,fontWeight:500,display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:'.05em'}}>Full Name</label>
                  <input type="text" required value={name} onChange={e=>setName(e.target.value)} placeholder="Admin Name" style={inp}
                    onFocus={e=>e.target.style.borderColor='#ef4444'} onBlur={e=>e.target.style.borderColor='#334155'}/>
                </div>
              )}
              <div>
                <label style={{color:'#64748b',fontSize:11,fontWeight:500,display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:'.05em'}}>Email Address</label>
                <input type="email" required value={email} onChange={e=>setEmail(e.target.value)} placeholder="admin@resqlink.com" style={inp}
                  onFocus={e=>e.target.style.borderColor='#ef4444'} onBlur={e=>e.target.style.borderColor='#334155'}/>
              </div>
              {mode!=='reset' && (
                <div>
                  <label style={{color:'#64748b',fontSize:11,fontWeight:500,display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:'.05em'}}>Password</label>
                  <input type="password" required value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" minLength={6} style={inp}
                    onFocus={e=>e.target.style.borderColor='#ef4444'} onBlur={e=>e.target.style.borderColor='#334155'}/>
                </div>
              )}
              <button type="submit" disabled={loading} style={btn}
                onMouseOver={e=>!loading&&(e.target.style.background='#dc2626')} onMouseOut={e=>e.target.style.background='#ef4444'}>
                {loading?'Processing…':mode==='login'?'Sign In':mode==='register'?'Create Account':'Send Reset Email'}
              </button>
            </form>

            <div style={{marginTop:16,display:'flex',flexDirection:'column',gap:8,textAlign:'center'}}>
              {mode==='login' && <>
                <button onClick={()=>setMode('reset')} style={{background:'none',border:'none',color:'#475569',fontSize:12,cursor:'pointer'}}>Forgot password?</button>
                <button onClick={()=>setMode('register')} style={{background:'none',border:'none',color:'#475569',fontSize:12,cursor:'pointer'}}>Create admin account</button>
              </>}
              {(mode==='register'||mode==='reset') && (
                <button onClick={()=>setMode('login')} style={{background:'none',border:'none',color:'#475569',fontSize:12,cursor:'pointer'}}>← Back to sign in</button>
              )}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

          <div style={{width:6,height:6,borderRadius:'50%',background:'#ef4444'}} className="pulse"/>
          <span style={{color:'#f87171',fontSize:11,fontWeight:600}}>LIVE</span>
        </div>
      </div>
    </header>
  );
}

// ─── Stat Card ────────────────────────────────────────────────────────────────
function StatCard({title,value,icon,color,sub,pulse:doPulse}) {
  const c = {red:'#ef4444',amber:'#f59e0b',green:'#10b981',blue:'#3b82f6',purple:'#8b5cf6'}[color];
  return (
    <div style={{background:`${c}08`,border:`1px solid ${c}25`,borderRadius:12,padding:'20px 20px 16px'}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
        <div>
          <p style={{color:'#64748b',fontSize:10,fontWeight:500,textTransform:'uppercase',letterSpacing:'.08em',marginBottom:6}}>{title}</p>
          <p style={{fontSize:32,fontWeight:700,color:c}}>
            {value}
            {doPulse && <span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'#ef4444',marginLeft:8,verticalAlign:'middle'}} className="pulse"/>}
          </p>
          {sub && <p style={{color:'#475569',fontSize:11,marginTop:4}}>{sub}</p>}
        </div>
        <span style={{fontSize:28,opacity:.6}}>{icon}</span>
      </div>
    </div>
  );
}

// ─── Badges ───────────────────────────────────────────────────────────────────
function TypeBadge({type}) {
  return <span style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:11,padding:'3px 8px',borderRadius:6,background:'#1e293b',color:'#94a3b8',border:'1px solid #334155'}}>
    <span>{TYPE_ICONS[type]||'⚠️'}</span><span>{TYPE_LABELS[type]||type}</span>
  </span>;
}
function LevelBadge({level}) {
  const c = levelColor(level);
  return <span style={{fontSize:11,padding:'2px 8px',borderRadius:4,background:`${c}15`,color:c,border:`1px solid ${c}30`,fontWeight:500}}>
    L{level} · {levelLabel(level)}
  </span>;
}
function StatusBadge({status}) {
  const c = statusColor(status);
  return <span style={{fontSize:11,padding:'2px 8px',borderRadius:4,background:`${c}15`,color:c,border:`1px solid ${c}30`,fontWeight:500,textTransform:'capitalize'}}>{status}</span>;
}
function TeamStatusBadge({status}) {
  const cols = {available:'#10b981',busy:'#ef4444',en_route:'#f59e0b',on_mission:'#3b82f6'};
  const c = cols[status]||'#94a3b8';
  return <span style={{fontSize:11,padding:'3px 10px',borderRadius:999,background:`${c}15`,color:c,border:`1px solid ${c}30`,fontWeight:500}}>{status.replace('_',' ')}</span>;
}

// ─── Dashboard Page ────────────────────────────────────────────────────────────
function DashboardPage({emergencies,teams,hospitals,drones,onDispatch,toast}) {
  const active = emergencies.filter(e=>e.status==='active');
  const resolved = emergencies.filter(e=>e.status==='resolved');
  const successRate = emergencies.length>0?Math.round((resolved.length/emergencies.length)*100):0;
  const availTeams = teams.filter(t=>t.status==='available');
  const dronesOnline = drones.filter(d=>d.status!=='standby').length;

  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const byMonth = months.map((m,i)=>({month:m,count:emergencies.filter(e=>new Date(e.createdAt).getMonth()===i).length}));
  const byType = Object.entries(
    emergencies.reduce((a,e)=>{a[e.type]=(a[e.type]||0)+1;return a;},{})
  ).map(([name,value])=>({name:name.replace(/_/g,' '),value})).sort((a,b)=>b.value-a.value).slice(0,6);

  const COLORS = ['#ef4444','#f59e0b','#3b82f6','#10b981','#8b5cf6','#ec4899'];
  const {BarChart,Bar,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,PieChart,Pie,Cell} = Recharts;
  const tt = {contentStyle:{background:'#1e293b',border:'1px solid #334155',borderRadius:8,fontSize:11},labelStyle:{color:'#94a3b8'},itemStyle:{color:'#e2e8f0'}};

  return (
    <div style={{display:'flex',flexDirection:'column',gap:20}}>
      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:16}}>
        <StatCard title="Active Emergencies" value={active.length} icon="🚨" color="red" sub="Needs attention" pulse={active.length>0}/>
        <StatCard title="Drones Online" value={dronesOnline} icon="🚁" color="blue" sub="In operation"/>
        <StatCard title="Teams Available" value={availTeams.length} icon="🦺" color="green" sub="Ready to deploy"/>
        <StatCard title="Hospitals Open" value={hospitals.filter(h=>h.isOpen).length} icon="🏥" color="amber" sub="Accepting patients"/>
        <StatCard title="Success Rate" value={`${successRate}%`} icon="✅" color="purple" sub="Resolved cases"/>
      </div>

      {/* Active feed + pie */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 320px',gap:16}}>
        <div style={{background:'#0f172a',borderRadius:12,border:'1px solid #1e293b',overflow:'hidden'}}>
          <div style={{padding:'16px 20px',borderBottom:'1px solid #1e293b',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div>
              <p style={{color:'#f1f5f9',fontWeight:600,fontSize:13}}>Active Emergencies</p>
              <p style={{color:'#475569',fontSize:11,marginTop:2}}>{active.length} incidents requiring action</p>
            </div>
            {active.length>0 && <div style={{display:'flex',alignItems:'center',gap:6,padding:'3px 10px',borderRadius:999,background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.2)'}}>
              <div style={{width:6,height:6,borderRadius:'50%',background:'#ef4444'}} className="pulse"/>
              <span style={{color:'#f87171',fontSize:11,fontWeight:600}}>LIVE</span>
            </div>}
          </div>
          <div style={{maxHeight:280,overflowY:'auto'}}>
            {active.length===0
              ? <div style={{padding:40,textAlign:'center',color:'#475569',fontSize:13}}>✅ No active emergencies</div>
              : active.slice(0,6).map(e=>(
                <div key={e.id} style={{padding:'14px 20px',borderBottom:'1px solid #1e293b',display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:6,alignItems:'center'}}>
                      <span style={{color:'#f1f5f9',fontSize:13,fontWeight:500}}>{e.userName}</span>
                      <LevelBadge level={e.level}/><StatusBadge status={e.status}/>
                    </div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:4}}><TypeBadge type={e.type}/></div>
                    <p style={{color:'#475569',fontSize:11}}>📍 {e.location.latitude.toFixed(4)}, {e.location.longitude.toFixed(4)} · {timeAgo(e.createdAt)}</p>
                  </div>
                  {availTeams.length>0 && (
                    <button onClick={()=>onDispatch(e.id,availTeams[0].id,availTeams[0].name)}
                      style={{padding:'5px 12px',fontSize:11,fontWeight:600,background:'rgba(245,158,11,.15)',color:'#fbbf24',border:'1px solid rgba(245,158,11,.3)',borderRadius:8,cursor:'pointer',whiteSpace:'nowrap',flexShrink:0}}>
                      Dispatch
                    </button>
                  )}
                </div>
              ))
            }
          </div>
        </div>

        {/* Pie chart */}
        <div style={{background:'#0f172a',borderRadius:12,border:'1px solid #1e293b',padding:20}}>
          <p style={{color:'#f1f5f9',fontWeight:600,fontSize:13,marginBottom:16}}>Incidents by Type</p>
          {byType.length>0
            ? <>
                <ResponsiveContainer width="100%" height={160}>
                  <PieChart><Pie data={byType} cx="50%" cy="50%" innerRadius={40} outerRadius={70} dataKey="value" paddingAngle={2}>
                    {byType.map((_,i)=><Cell key={i} fill={COLORS[i%COLORS.length]}/>)}

                </ResponsiveContainer>
                <div style={{display:'flex',flexDirection:'column',gap:6,marginTop:8}}>
                  {byType.map((d,i)=>(
                    <div key={d.name} style={{display:'flex',alignItems:'center',justifyContent:'space-between',fontSize:11}}>
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        <div style={{width:8,height:8,borderRadius:'50%',background:COLORS[i%COLORS.length],flexShrink:0}}/>
                        <span style={{color:'#94a3b8',textTransform:'capitalize'}}>{d.name}</span>
                      </div>
                      <span style={{color:'#e2e8f0',fontWeight:500}}>{d.value}</span>
                    </div>
                  ))}
                </div>
              </>
            : <div style={{height:200,display:'flex',alignItems:'center',justifyContent:'center',color:'#475569',fontSize:12}}>No data yet</div>
          }
        </div>
      </div>

      {/* Bar chart + teams */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 320px',gap:16}}>
        <div style={{background:'#0f172a',borderRadius:12,border:'1px solid #1e293b',padding:20}}>
          <p style={{color:'#f1f5f9',fontWeight:600,fontSize:13,marginBottom:16}}>Monthly Emergency Trend</p>
          <ResponsiveContainer width="100%" height={180}>
            <BarChart data={byMonth} margin={{left:-20,right:0,top:0,bottom:0}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#1e293b"/>
              <XAxis dataKey="month" tick={{fill:'#475569',fontSize:10}}/>
              <YAxis tick={{fill:'#475569',fontSize:10}} allowDecimals={false}/>
              <Tooltip {...tt}/>
              <Bar dataKey="count" fill="#ef4444" radius={[4,4,0,0]} name="Emergencies"/>
            </BarChart>
          </ResponsiveContainer>
        </div>

        {/* Drone fleet */}
        <div style={{background:'#0f172a',borderRadius:12,border:'1px solid #1e293b',padding:20}}>
          <p style={{color:'#f1f5f9',fontWeight:600,fontSize:13,marginBottom:16}}>Drone Fleet</p>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {drones.map(d=>{
              const bc = d.battery>50?'#10b981':d.battery>20?'#f59e0b':'#ef4444';
              return (
                <div key={d.id} style={{padding:'10px 14px',borderRadius:10,background:'#1e293b',border:'1px solid #334155'}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                    <span style={{color:'#f1f5f9',fontSize:12,fontWeight:600}}>🚁 {d.name}</span>
                    <span style={{fontSize:10,color:'#94a3b8',textTransform:'capitalize'}}>{d.status.replace(/_/g,' ')}</span>
                  </div>
                  <div style={{display:'flex',gap:12,fontSize:11,marginBottom:8}}>
                    <span style={{color:'#64748b'}}>Alt: <span style={{color:'#e2e8f0'}}>{d.altitude}m</span></span>
                    <span style={{color:'#64748b'}}>Spd: <span style={{color:'#e2e8f0'}}>{d.speed}km/h</span></span>
                  </div>
                  <div style={{height:4,borderRadius:999,background:'#334155'}}>
                    <div style={{height:4,borderRadius:999,background:bc,width:`${d.battery}%`,transition:'width .3s'}}/>
                  </div>
                  <p style={{color:bc,fontSize:10,marginTop:3,textAlign:'right'}}>{d.battery}%</p>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Live Emergencies Page ────────────────────────────────────────────────────
function EmergenciesPage({emergencies,teams,onDispatch,onResolve,onCancel}) {
  const [filter,setFilter] = useState('all');
  const [sel,setSel] = useState(null);
  const filtered = filter==='all'?emergencies:emergencies.filter(e=>e.status===filter);
  const selected = emergencies.find(e=>e.id===sel);
  const aid = selected?(FIRST_AID[selected.type]||FIRST_AID.default):[];
  const availTeams = teams.filter(t=>t.status==='available');

  return (
    <div style={{display:'flex',gap:16,height:'calc(100vh - 100px)'}}>
      <div style={{flex:1,minWidth:0,background:'#0f172a',borderRadius:12,border:'1px solid #1e293b',display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{padding:'14px 20px',borderBottom:'1px solid #1e293b',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>

            <p style={{color:'#f1f5f9',fontWeight:600,fontSize:13}}>Emergency Feed</p>

          <div style={{display:'flex',gap:6}}>
            {['all','active','assigned','resolved','cancelled'].map(f=>(
              <button key={f} onClick={()=>setFilter(f)}
                style={{padding:'5px 12px',fontSize:11,borderRadius:8,border:`1px solid ${filter===f?'rgba(239,68,68,.3)':'#334155'}`,cursor:'pointer',background:filter===f?'rgba(239,68,68,.1)':'transparent',color:filter===f?'#f87171':'#64748b',textTransform:'capitalize'}}>
                {f}
              </button>
            ))}
          </div>
        </div>
        <div style={{flex:1,overflowY:'auto'}}>
          {filtered.length===0
            ? <div style={{padding:40,textAlign:'center',color:'#475569',fontSize:13}}>No emergencies found</div>
            : filtered.map(e=>(
              <div key={e.id} onClick={()=>setSel(sel===e.id?null:e.id)}
                style={{padding:'14px 20px',borderBottom:'1px solid #1e293b',cursor:'pointer',background:sel===e.id?'#1e293b':'transparent',transition:'background .15s'}}>
                <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:6,alignItems:'center'}}>
                      <span style={{color:'#f1f5f9',fontWeight:500,fontSize:13}}>{e.userName}</span>
                      {e.userPhone&&<span style={{color:'#475569',fontSize:11}}>{e.userPhone}</span>}
                    </div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:6}}>
                      <TypeBadge type={e.type}/><LevelBadge level={e.level}/><StatusBadge status={e.status}/>
                    </div>
                    <div style={{display:'flex',gap:12,fontSize:11,color:'#475569',flexWrap:'wrap'}}>
                      <span>📍 {e.location.latitude.toFixed(4)}, {e.location.longitude.toFixed(4)}</span>
                      <span>· {timeAgo(e.createdAt)}</span>
                      {e.bloodGroup&&<span>· 🩸 {e.bloodGroup}</span>}
                      {e.assignedTeamName&&<span>· 🦺 {e.assignedTeamName}</span>}
                    </div>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:4,flexShrink:0}} onClick={ev=>ev.stopPropagation()}>
                    {e.status==='active'&&availTeams.length>0&&(
                      <button onClick={()=>onDispatch(e.id,availTeams[0].id,availTeams[0].name)}
                        style={{padding:'5px 10px',fontSize:11,fontWeight:600,background:'rgba(245,158,11,.15)',color:'#fbbf24',border:'1px solid rgba(245,158,11,.3)',borderRadius:6,cursor:'pointer'}}>
                        Dispatch
                      </button>
                    )}
                    {e.status==='assigned'&&(
                      <button onClick={()=>onResolve(e.id)}
                        style={{padding:'5px 10px',fontSize:11,fontWeight:600,background:'rgba(16,185,129,.15)',color:'#34d399',border:'1px solid rgba(16,185,129,.3)',borderRadius:6,cursor:'pointer'}}>
                        Resolve ✓
                      </button>
                    )}
                    {e.status==='active'&&(
                      <button onClick={()=>onCancel(e.id)}
                        style={{padding:'5px 10px',fontSize:11,background:'#1e293b',color:'#64748b',border:'1px solid #334155',borderRadius:6,cursor:'pointer'}}>
                        Cancel
                      </button>
                    )}

                </div>
              </div>
            ))

        </div>
      </div>

      {/* Detail panel */}
      <div style={{width:300,flexShrink:0}}>
        {selected
          ? <div style={{background:'#0f172a',borderRadius:12,border:'1px solid #1e293b',height:'100%',display:'flex',flexDirection:'column',overflow:'hidden'}}>
              <div style={{padding:'14px 16px',borderBottom:'1px solid #1e293b'}}>

                  <div><p style={{color:'#475569',fontSize:11,marginBottom:6}}>Level</p><LevelBadge level={selected.level}/></div>
                  <div><p style={{color:'#475569',fontSize:11,marginBottom:6}}>Status</p><StatusBadge status={selected.status}/></div>
                </div>
                {selected.bloodGroup&&<div><p style={{color:'#475569',fontSize:11,marginBottom:4}}>Blood Group</p>
                  <p style={{color:'#f87171',fontSize:18,fontWeight:700}}>{selected.bloodGroup}</p>
                </div>}
                <div><p style={{color:'#475569',fontSize:11,marginBottom:4}}>GPS</p>
                  <p style={{color:'#f1f5f9',fontSize:11,fontFamily:'monospace'}}>{selected.location.latitude.toFixed(6)}<br/>{selected.location.longitude.toFixed(6)}</p>
                </div>
                {selected.assignedTeamName&&<div><p style={{color:'#475569',fontSize:11,marginBottom:4}}>Assigned Team</p>
                  <p style={{color:'#fbbf24',fontSize:13}}>🦺 {selected.assignedTeamName}</p>
                </div>}
                <div>
                  <p style={{color:'#475569',fontSize:11,marginBottom:8}}>First Aid Guide</p>
                  <div style={{display:'flex',flexDirection:'column',gap:6}}>
                    {aid.map((step,i)=>(
                      <div key={i} style={{display:'flex',gap:8,fontSize:11}}>

              <p style={{color:'#334155',fontSize:13,textAlign:'center',padding:20}}>Click an incident<br/>to view details</p>
            </div>
        }
      </div>
    </div>
  );
}

                    <p style={{color:'#f1f5f9',fontSize:13,fontWeight:500}}>{v}</p>

                      🚀 Launch

                  : <button onClick={()=>onReturn(d.id)}
                      style={{flex:1,padding:'9px',fontSize:12,fontWeight:600,background:'#1e293b',color:'#94a3b8',border:'1px solid #334155',borderRadius:8,cursor:'pointer'}}>
                      ↩ Return to Base
                    </button>
                }
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

                background:h.isOpen?'rgba(16,185,129,.1)':'rgba(239,68,68,.1)',

                {h.isOpen?'Open':'Closed'}

            <div style={{display:'flex',flexDirection:'column',gap:8,fontSize:12}}>

                <div key={l} style={{display:'flex',justifyContent:'space-between'}}>

// ─── Analytics Page ───────────────────────────────────────────────────────────
function AnalyticsPage({emergencies}) {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const byMonth = months.map((m,i)=>({month:m,count:emergencies.filter(e=>new Date(e.createdAt).getMonth()===i).length}));
  const byType = Object.entries(emergencies.reduce((a,e)=>{a[e.type]=(a[e.type]||0)+1;return a;},{}))
    .map(([type,count])=>({type:type.replace(/_/g,' '),count})).sort((a,b)=>b.count-a.count);
  const resolved = emergencies.filter(e=>e.status==='resolved').length;
  const success = emergencies.length?Math.round((resolved/emergencies.length)*100):0;
  const {BarChart,Bar,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,LineChart,Line} = Recharts;
  const tt = {contentStyle:{background:'#1e293b',border:'1px solid #334155',borderRadius:8,fontSize:11},labelStyle:{color:'#94a3b8'},itemStyle:{color:'#e2e8f0'}};

  return (
    <div style={{display:'flex',flexDirection:'column',gap:20}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16}}>
        {[
          {label:'Total Emergencies',value:emergencies.length,color:'#f1f5f9'},
          {label:'Resolved Today',value:resolved,color:'#34d399'},
          {label:'Success Rate',value:`${success}%`,color:'#60a5fa'},
          {label:'Avg Response',value:'8.4m',color:'#fbbf24'},
        ].map(s=>(
          <div key={s.label} style={{background:'#0f172a',borderRadius:12,border:'1px solid #1e293b',padding:20}}>
            <p style={{color:'#475569',fontSize:10,textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}}>{s.label}</p>
            <p style={{fontSize:32,fontWeight:700,color:s.color}}>{s.value}</p>
          </div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <div style={{background:'#0f172a',borderRadius:12,border:'1px solid #1e293b',padding:20}}>
          <p style={{color:'#f1f5f9',fontWeight:600,fontSize:13,marginBottom:16}}>Monthly Trend</p>
          <ResponsiveContainer width="100%" height={200}>
            <LineChart data={byMonth} margin={{left:-20}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#1e293b"/>
              <XAxis dataKey="month" tick={{fill:'#475569',fontSize:10}}/>
              <YAxis tick={{fill:'#475569',fontSize:10}} allowDecimals={false}/>
              <Tooltip {...tt}/>
              <Line type="monotone" dataKey="count" stroke="#ef4444" strokeWidth={2} dot={{fill:'#ef4444',r:3}} name="Emergencies"/>
            </LineChart>
          </ResponsiveContainer>
        </div>
        <div style={{background:'#0f172a',borderRadius:12,border:'1px solid #1e293b',padding:20}}>
          <p style={{color:'#f1f5f9',fontWeight:600,fontSize:13,marginBottom:16}}>Emergency Types</p>
          <ResponsiveContainer width="100%" height={200}>
            <BarChart data={byType} layout="vertical" margin={{left:70,right:10}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" horizontal={false}/>
              <XAxis type="number" tick={{fill:'#475569',fontSize:10}} allowDecimals={false}/>
              <YAxis type="category" dataKey="type" tick={{fill:'#94a3b8',fontSize:10}} width={90}/>
              <Tooltip {...tt}/>
              <Bar dataKey="count" fill="#3b82f6" radius={[0,4,4,0]} name="Count"/>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser]             = useState(null);
  const [page, setPage]             = useState('dashboard');
  const [emergencies, setEmergencies] = useState(DEMO_EMERGENCIES);
  const [teams, setTeams]           = useState(DEMO_TEAMS);
  const [hospitals, setHospitals]   = useState(DEMO_HOSPITALS);
  const [drones, setDrones]         = useState(DEMO_DRONES);
  const [authLoading, setAuthLoading] = useState(!DEMO_MODE);
  const {toasts, show: toast}       = useToast();

  // Firebase auth observer
  useEffect(() => {
    if (DEMO_MODE) return;
    const unsub = auth.onAuthStateChanged(async (fbUser) => {
      if (fbUser) {
        try {
          const snap = await db.collection('users').doc(fbUser.uid).get();
          if (snap.exists && snap.data().role === 'admin') {
            const d = snap.data();
            setUser({ uid: fbUser.uid, email: fbUser.email, displayName: d.displayName || 'Admin', role: 'admin' });
          } else {
            await auth.signOut();
          }
        } catch { setUser(null); }
      } else { setUser(null); }
      setAuthLoading(false);
    });
    return unsub;
  }, []);

  // Firebase real-time subscriptions
  useEffect(() => {
    if (DEMO_MODE || !user) return;
    const unsubs = [
      db.collection('emergencies').orderBy('createdAt','desc').limit(100).onSnapshot(snap => {
        setEmergencies(snap.docs.map(d => ({ id: d.id, ...d.data(), createdAt: d.data().createdAt?.toMillis?.() || Date.now() })));
      }),
      db.collection('rescue_teams').orderBy('name').onSnapshot(snap => {
        setTeams(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      }),
      db.collection('hospitals').orderBy('name').onSnapshot(snap => {
        setHospitals(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      }),
      db.collection('drone_logs').onSnapshot(snap => {
        setDrones(snap.docs.map(d => ({ id: d.id, ...d.data(), lastUpdated: d.data().lastUpdated?.toMillis?.() || Date.now() })));
      }),
    ];
    return () => unsubs.forEach(u => u());
  }, [user]);

  // Simulate live updates in demo mode
  useEffect(() => {
    if (!DEMO_MODE || !user) return;
    const interval = setInterval(() => {
      setEmergencies(prev => prev.map(e =>
        e.status === 'active' && Math.random() < 0.05
          ? { ...e, location: { ...e.location, latitude: e.location.latitude + (Math.random()-.5)*.001 }}
          : e
      ));
    }, 5000);
    return () => clearInterval(interval);
  }, [user]);

  const handleDispatch = async (emergencyId, teamId, teamName) => {
    setEmergencies(prev => prev.map(e => e.id===emergencyId ? {...e, status:'assigned', assignedTeamName: teamName} : e));
    setTeams(prev => prev.map(t => t.id===teamId ? {...t, status:'on_mission'} : t));
    if (!DEMO_MODE) {
      await db.collection('emergencies').doc(emergencyId).update({ status:'assigned', assignedTeamId:teamId, assignedTeamName:teamName, updatedAt:firebase.firestore.FieldValue.serverTimestamp() });
    }
    toast(`✅ ${teamName} dispatched successfully`, 'success');
  };

  const handleResolve = async (id) => {
    setEmergencies(prev => prev.map(e => e.id===id ? {...e, status:'resolved'} : e));
    if (!DEMO_MODE) await db.collection('emergencies').doc(id).update({ status:'resolved', resolvedAt:firebase.firestore.FieldValue.serverTimestamp() });
    toast('✅ Emergency marked as resolved', 'success');
  };

  const handleCancel = async (id) => {
    setEmergencies(prev => prev.map(e => e.id===id ? {...e, status:'cancelled'} : e));
    if (!DEMO_MODE) await db.collection('emergencies').doc(id).update({ status:'cancelled', updatedAt:firebase.firestore.FieldValue.serverTimestamp() });
    toast('Emergency cancelled', 'info');
  };

  const handleDroneLaunch = async (id) => {
    setDrones(prev => prev.map(d => d.id===id ? {...d, status:'searching', altitude:80, speed:45} : d));
    toast('🚁 Drone launched — Searching for victim', 'info');
    setTimeout(() => {
      setDrones(prev => prev.map(d => d.id===id ? {...d, status:'en_route', altitude:120, speed:60} : d));
      toast('🚁 Drone en route to incident location', 'success');
    }, 3000);
    if (!DEMO_MODE) await db.collection('drone_logs').doc(id).update({ status:'searching', altitude:80, speed:45 });
  };

  const handleDroneReturn = async (id) => {
    setDrones(prev => prev.map(d => d.id===id ? {...d, status:'standby', altitude:0, speed:0} : d));
    if (!DEMO_MODE) await db.collection('drone_logs').doc(id).update({ status:'standby', altitude:0, speed:0 });
    toast('Drone returned to base', 'info');
  };

  const handleLogout = async () => {
    if (!DEMO_MODE) await auth.signOut();
    setUser(null);
    toast('Logged out successfully', 'info');
  };

  if (authLoading) return (
    <div style={{minHeight:'100vh',background:'#020617',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{textAlign:'center'}}>
        <div style={{width:52,height:52,borderRadius:12,background:'#ef4444',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,fontWeight:700,color:'#fff',margin:'0 auto 16px'}}>R</div>
        <div style={{width:24,height:24,border:'2px solid #ef4444',borderTopColor:'transparent',borderRadius:'50%',margin:'0 auto 12px'}} className="spin"/>
        <p style={{color:'#475569',fontSize:13}}>Initializing ResQLink…</p>
      </div>
    </div>
  );

  if (!user) return <>
    <LoginPage onLogin={setUser}/>
    <Toasts toasts={toasts}/>
  </>;

  const activeCount = emergencies.filter(e=>e.status==='active').length;

  return (
    <div style={{minHeight:'100vh',background:'#020617'}}>
      <Sidebar page={page} setPage={setPage} user={user} onLogout={handleLogout}/>
      <TopNav page={page} activeCount={activeCount}/>
      <main style={{marginLeft:240,paddingTop:60,minHeight:'100vh'}}>
        <div style={{padding:24}} className="fade-in">
          {page==='dashboard'    && <DashboardPage emergencies={emergencies} teams={teams} hospitals={hospitals} drones={drones} onDispatch={handleDispatch} toast={toast}/>}
          {page==='emergencies'  && <EmergenciesPage emergencies={emergencies} teams={teams} onDispatch={handleDispatch} onResolve={handleResolve} onCancel={handleCancel}/>}
          {page==='rescue-teams' && <RescueTeamsPage teams={teams}/>}
          {page==='drone-control'&& <DroneControlPage drones={drones} onLaunch={handleDroneLaunch} onReturn={handleDroneReturn}/>}
          {page==='victims'      && <VictimPage emergencies={emergencies}/>}
          {page==='hospitals'    && <HospitalsPage hospitals={hospitals}/>}
          {page==='analytics'    && <AnalyticsPage emergencies={emergencies}/>}
          {page==='settings'     && <SettingsPage user={user}/>}
        </div>
      </main>
      <Toasts toasts={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
